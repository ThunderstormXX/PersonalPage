<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Early-exit LLM preview</title>
  <desc id="desc">A schematic transformer stack with intermediate exits, aligners, and an adapter choosing when to stop inference.</desc>
  <rect width="1600" height="900" fill="#f8fafc"/>
  <rect x="92" y="92" width="1416" height="716" rx="30" fill="#ffffff" stroke="#d7e1e7" stroke-width="4"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="176" y="190" font-size="48" font-weight="850" fill="#182231">SkipLayer / EarlyExit</text>
    <text x="178" y="242" font-size="28" font-weight="650" fill="#607080">Layer-wise alignment with adaptive stopping</text>
  </g>
  <g transform="translate(180 330)">
    <g fill="#e8f5f6" stroke="#087c89" stroke-width="4">
      <rect x="0" y="0" width="190" height="84" rx="18"/>
      <rect x="0" y="116" width="190" height="84" rx="18"/>
      <rect x="0" y="232" width="190" height="84" rx="18"/>
    </g>
    <g fill="#10272c" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">
      <text x="95" y="53" text-anchor="middle">Layer 4</text>
      <text x="95" y="169" text-anchor="middle">Layer 8</text>
      <text x="95" y="285" text-anchor="middle">Layer 12</text>
    </g>
  </g>
  <g transform="translate(474 300)">
    <g fill="none" stroke="#263241" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 72h210"/>
      <path d="M0 188h210"/>
      <path d="M0 304h210"/>
      <path d="M210 72l-28-22m28 22l-28 22"/>
      <path d="M210 188l-28-22m28 22l-28 22"/>
      <path d="M210 304l-28-22m28 22l-28 22"/>
    </g>
    <g fill="#fff2ef" stroke="#df6d5f" stroke-width="4">
      <rect x="240" y="24" width="188" height="96" rx="18"/>
      <rect x="240" y="140" width="188" height="96" rx="18"/>
      <rect x="240" y="256" width="188" height="96" rx="18"/>
    </g>
    <g fill="#263241" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">
      <text x="334" y="82" text-anchor="middle">Aligner</text>
      <text x="334" y="198" text-anchor="middle">Aligner</text>
      <text x="334" y="314" text-anchor="middle">Final</text>
    </g>
  </g>
  <g transform="translate(988 332)">
    <rect width="296" height="232" rx="24" fill="#eef1f4" stroke="#263241" stroke-width="5"/>
    <text x="148" y="72" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="850" fill="#263241">Adapter</text>
    <path d="M74 124h148M74 164h92" stroke="#087c89" stroke-width="16" stroke-linecap="round"/>
    <text x="148" y="206" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#607080">stop or continue</text>
  </g>
  <g fill="none" stroke="#087c89" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M910 488h70"/>
    <path d="M980 488l-32-25m32 25l-32 25"/>
    <path d="M1284 448h136"/>
    <path d="M1420 448l-32-25m32 25l-32 25"/>
  </g>
  <g transform="translate(1360 378)">
    <rect width="112" height="140" rx="22" fill="#10272c"/>
    <circle cx="56" cy="48" r="16" fill="#31b6c5"/>
    <path d="M34 90h44M34 116h44" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="25" font-weight="750" fill="#607080">
    <text x="178" y="710">Cross-entropy over aligned intermediate logits against the final-layer target distribution</text>
  </g>
